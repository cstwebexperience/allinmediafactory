<!DOCTYPE html>
<html><head>
<meta charset="UTF-8">
<title>Clip-Path Calibration</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#111;color:#fff;font-family:monospace;display:flex;flex-direction:column;align-items:center;padding:20px}
  .container{position:relative;display:inline-block;cursor:crosshair}
  .container img{display:block;width:900px;height:auto}
  .dot{position:absolute;width:8px;height:8px;background:red;border-radius:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
  .grid-line-v,.grid-line-h{position:absolute;pointer-events:none;z-index:5}
  .grid-line-v{width:1px;height:100%;top:0;background:rgba(255,255,255,.08)}
  .grid-line-h{height:1px;width:100%;left:0;background:rgba(255,255,255,.08)}
  #coords{position:fixed;top:10px;right:10px;background:#222;padding:15px;border-radius:8px;font-size:13px;max-height:90vh;overflow-y:auto;min-width:280px}
  #output{white-space:pre;font-size:11px;margin-top:10px;color:#0f0}
  .btn{background:#7c3aed;color:#fff;border:none;padding:6px 14px;border-radius:4px;cursor:pointer;margin:4px;font-size:12px}
  .btn:hover{background:#6d28d9}
  h3{color:#a78bfa;margin:8px 0 4px}
</style>
</head><body>
<h2 style="margin-bottom:15px">Click pe imagine pentru a adăuga puncte. Coordonatele sunt în procente.</h2>
<div class="container" id="container">
  <img src="masca-despicata.png" id="img">
</div>

<div id="coords">
  <div>
    <button class="btn" onclick="setFragment('left-eye')">Left Eye</button>
    <button class="btn" onclick="setFragment('right-eye')">Right Eye</button>
    <button class="btn" onclick="setFragment('nose')">Nose</button>
    <button class="btn" onclick="setFragment('left-mouth')">Left Mouth</button>
    <button class="btn" onclick="setFragment('right-mouth')">Right Mouth</button>
  </div>
  <div style="margin-top:8px">
    <button class="btn" style="background:#dc2626" onclick="undoPoint()">Undo</button>
    <button class="btn" style="background:#059669" onclick="outputAll()">Generate CSS</button>
  </div>
  <h3>Current: <span id="cur-frag">left-eye</span></h3>
  <div>Points: <span id="point-count">0</span> | Last: <span id="last-point">-</span></div>
  <div id="output"></div>
</div>

<script>
const container = document.getElementById('container');
const img = document.getElementById('img');
let currentFragment = 'left-eye';
const fragments = {
  'left-eye': [],
  'right-eye': [],
  'nose': [],
  'left-mouth': [],
  'right-mouth': []
};
const colors = {
  'left-eye': '#ef4444',
  'right-eye': '#3b82f6',
  'nose': '#22c55e',
  'left-mouth': '#f59e0b',
  'right-mouth': '#ec4899'
};

// Grid every 10%
for(let i=10;i<=90;i+=10){
  const v=document.createElement('div');
  v.className='grid-line-v';
  v.style.left=i+'%';
  v.title=i+'%';
  container.appendChild(v);
  const h=document.createElement('div');
  h.className='grid-line-h';
  h.style.top=i+'%';
  h.title=i+'%';
  container.appendChild(h);
}

function setFragment(name){
  currentFragment=name;
  document.getElementById('cur-frag').textContent=name;
  document.getElementById('point-count').textContent=fragments[name].length;
}

container.addEventListener('click', (e) => {
  const rect = img.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  
  fragments[currentFragment].push({x, y});
  
  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.left = x + '%';
  dot.style.top = y + '%';
  dot.style.background = colors[currentFragment];
  dot.dataset.frag = currentFragment;
  dot.dataset.idx = fragments[currentFragment].length - 1;
  container.appendChild(dot);
  
  document.getElementById('point-count').textContent = fragments[currentFragment].length;
  document.getElementById('last-point').textContent = x + '% ' + y + '%';
});

function undoPoint(){
  const pts = fragments[currentFragment];
  if(!pts.length) return;
  pts.pop();
  const dots = container.querySelectorAll('.dot[data-frag="'+currentFragment+'"]');
  if(dots.length) dots[dots.length-1].remove();
  document.getElementById('point-count').textContent = pts.length;
}

function outputAll(){
  let css = '';
  for(const [name, pts] of Object.entries(fragments)){
    if(!pts.length) continue;
    const poly = pts.map(p => p.x+'% '+p.y+'%').join(', ');
    css += '#frag-' + name + ' {\n  clip-path: polygon(' + poly + ');\n}\n\n';
  }
  document.getElementById('output').textContent = css || 'No points defined yet.';
}
</script>
</body></html>
